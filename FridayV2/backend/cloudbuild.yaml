steps:
  # Create Artifact Registry repo if it doesn't exist
  - name: gcr.io/cloud-builders/gcloud
    args:
      - artifacts
      - repositories
      - create
      - friday
      - --repository-format=docker
      - --location=asia-southeast1
      - --description=Friday V2 container images
    allowFailure: true

  # Build Telegram bot image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:$COMMIT_SHA
      - -f
      - Dockerfile
      - .

  # Build LiveKit voice agent image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:$COMMIT_SHA
      - -f
      - Dockerfile.voice
      - .

  # Push both images
  - name: gcr.io/cloud-builders/docker
    args: [push, asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:$COMMIT_SHA]

  - name: gcr.io/cloud-builders/docker
    args: [push, asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:$COMMIT_SHA]

  # Deploy Telegram bot + dashboard API to Cloud Run (port 8001)
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - friday-v2-bot
      - --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --port=8001
      - --allow-unauthenticated

  # Deploy voice agent to Cloud Run
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - friday-v2-voice
      - --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --no-allow-unauthenticated

images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:$COMMIT_SHA
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:$COMMIT_SHA
