steps:
  # Build Telegram bot image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/friday-v2-bot:$COMMIT_SHA
      - -f
      - Dockerfile
      - .

  # Build LiveKit voice agent image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/friday-v2-voice:$COMMIT_SHA
      - -f
      - Dockerfile.voice
      - .

  # Push both images
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/friday-v2-bot:$COMMIT_SHA]

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/friday-v2-voice:$COMMIT_SHA]

  # Deploy Telegram bot + dashboard API to Cloud Run (port 8001)
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - friday-v2-bot
      - --image=gcr.io/$PROJECT_ID/friday-v2-bot:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --port=8001
      - --allow-unauthenticated

  # Deploy voice agent to Cloud Run
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - friday-v2-voice
      - --image=gcr.io/$PROJECT_ID/friday-v2-voice:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --no-allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/friday-v2-bot:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/friday-v2-voice:$COMMIT_SHA
