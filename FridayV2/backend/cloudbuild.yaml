steps:
  # Create Artifact Registry repo if it doesn't exist
  - name: gcr.io/cloud-builders/gcloud
    args:
      - artifacts
      - repositories
      - create
      - friday
      - --repository-format=docker
      - --location=asia-southeast1
      - --description=Friday V2 container images
    allowFailure: true

  # Pull previous bot image for layer cache (allowFailure for first build)
  - name: gcr.io/cloud-builders/docker
    args: [pull, asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:latest]
    allowFailure: true

  # Pull previous voice image for layer cache (allowFailure for first build)
  - name: gcr.io/cloud-builders/docker
    args: [pull, asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:latest]
    allowFailure: true

  # Build Telegram bot image (with layer cache)
  - name: gcr.io/cloud-builders/docker
    dir: FridayV2/backend
    args:
      - build
      - --cache-from
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:latest
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:$COMMIT_SHA
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:latest
      - -f
      - Dockerfile
      - .

  # Build LiveKit voice agent image (with layer cache)
  - name: gcr.io/cloud-builders/docker
    dir: FridayV2/backend
    args:
      - build
      - --cache-from
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:latest
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:$COMMIT_SHA
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:latest
      - -f
      - Dockerfile.voice
      - .

  # Push both images (commit SHA + latest tags)
  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot]

  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice]

  # Deploy Telegram bot + dashboard API to Cloud Run (port 8001)
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - friday-v2-bot
      - --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --port=8001
      - --allow-unauthenticated

  # Deploy voice agent to Cloud Run (secrets + env vars preserved on every deploy)
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - friday-v2-voice
      - --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --no-allow-unauthenticated
      - --memory=2Gi
      - --cpu=2
      - --min-instances=1
      - --update-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_KEY=supabase-key:latest,TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,TELEGRAM_USER_ID=telegram-user-id:latest,LIVEKIT_API_KEY=livekit-api-key:latest,LIVEKIT_API_SECRET=livekit-api-secret:latest,DEEPGRAM_API_KEY=deepgram-api-key:latest,TAVILY_API_KEY=tavily-api-key:latest,GARMIN_EMAIL=garmin-email:latest,GARMIN_PASSWORD=garmin-password:latest,FINANCE_FOLDER_ID=finance-folder-id:latest,GOOGLE_CLIENT_SECRET_JSON=google-client-secret:latest,GDRIVE_TOKEN_JSON=gdrive-token:latest
      - --update-env-vars=LIVEKIT_URL=wss://friday-yczj5kgm.livekit.cloud,GDRIVE_VAULT_NAME=Q_obsidian,FRIDAY_MODEL=claude-haiku-4-5-20251001,NOTES_AGENT_MODEL=claude-haiku-4-5-20251001,TIMEZONE=Asia/Singapore,CURRENCY=SGD,GARMIN_DAILY_PUSH_TIME=06:00,PYTHONUNBUFFERED=1

images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-bot:$COMMIT_SHA
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/friday/friday-v2-voice:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
